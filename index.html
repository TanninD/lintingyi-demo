<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>邻停易 - 车位互换共享平台 DEMO</title>
    <!-- 原有的所有 CSS 样式可以保留 -->
    <style>
        /* 这里粘贴你之前的 CSS 代码，或者用你已有的样式 */
    </style>
</head>
<body>
    <!-- 你的页面内容 -->

    <!-- 测试结果显示区域 -->
    <div id="test-result" style="text-align:center; margin:20px; font-weight:bold;"></div>

    <!-- Supabase SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
      const SUPABASE_URL = 'https://prmhoyvyxthqlrjkeoho.supabase.co';
      const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBybWhveXZ5eHRocWxyamtlb2hvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIzOTY3NzQsImV4cCI6MjA5Nzk3Mjc3NH0.DWkUXWzNnA_MmBcLZ7tiPXUUyMLqmJEtxc2Nk-q_O44';

      // 正确的初始化方式：supabase 是 CDN 引入后的全局变量
      const client = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

      async function autoTest() {
        const el = document.getElementById('test-result');
        const { data, error } = await client
          .from('feedbacks')
          .select('*')
          .limit(1);
        if (error) {
          el.textContent = '连接失败: ' + error.message;
          el.style.color = 'red';
        } else {
          el.textContent = '连接成功！数据库里有 ' + data.length + ' 条反馈记录。';
          el.style.color = 'green';
        }
      }

      window.addEventListener('load', autoTest);
    </script>
    <!-- 你原有的其他脚本 -->
</body>
</html>
