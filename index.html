<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>邻停易 - 车位互换共享平台 DEMO</title>
    <style>
        :root {
            --brand-green: #00B894;
            --brand-green-dark: #00a381;
            --brand-blue: #0984E3;
            --warning: #FF7675;
            --bg: #F5F6FA;
            --card: #FFFFFF;
            --text-primary: #1a1a2e;
            --text-secondary: #636e72;
            --text-muted: #b2bec3;
            --border: #e9ecef;
            --shadow: 0 2px 12px rgba(0,0,0,0.08);
            --shadow-lg: 0 8px 30px rgba(0,0,0,0.12);
            --radius: 12px;
            --radius-xl: 20px;
            --bounce: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Helvetica Neue', sans-serif;
            background: #e8ecf1;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            -webkit-user-select: none;
            padding: 10px;
        }
        .phone-frame {
            width: 390px; max-width: 100%; height: 844px; max-height: 95vh;
            background: #1a1a2e; border-radius: 32px; padding: 10px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        .phone-screen {
            width: 100%; height: 100%; background: var(--bg);
            border-radius: 24px; overflow: hidden;
            display: flex; flex-direction: column;
        }
        .status-bar {
            height: 44px; background: #fff;
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 20px; font-size: 13px; font-weight: 600;
            color: var(--text-primary); flex-shrink: 0;
        }
        .main-content {
            flex: 1; overflow-y: auto; overflow-x: hidden;
            -webkit-overflow-scrolling: touch; padding: 16px;
        }
        .page { display: none; }
        .page.active { display: block; animation: fadeSlideIn 0.35s ease forwards; }
        @keyframes fadeSlideIn {
            from { opacity:0; transform:translateY(12px); }
            to { opacity:1; transform:translateY(0); }
        }
        @keyframes popIn {
            from { opacity:0; transform:scale(0.85); }
            to { opacity:1; transform:scale(1); }
        }

        /* 按钮 */
        .btn {
            display: inline-flex; align-items: center; gap: 6px;
            padding: 12px 24px; border-radius: 25px;
            font-size: 14px; font-weight: 600; border: none;
            cursor: pointer; transition: var(--bounce);
            -webkit-tap-highlight-color: transparent;
        }
        .btn-primary { background: var(--brand-green); color: #fff; }
        .btn-primary:active { transform: scale(0.94); background: var(--brand-green-dark); }
        .btn-block { display: block; width: 100%; text-align: center; }

        /* 表单弹窗 */
        .overlay {
            position: fixed; top:0; left:0; right:0; bottom:0;
            background: rgba(0,0,0,0.55); z-index: 100;
            display: flex; align-items: center; justify-content: center;
            animation: fadeIn 0.2s ease;
        }
        .overlay.hidden { display: none; }
        @keyframes fadeIn { from { opacity:0; } to { opacity:1; } }
        .modal {
            background: #fff; border-radius: var(--radius-xl);
            padding: 24px 20px 20px; width: 330px; max-width: 90%;
            animation: popIn 0.35s ease forwards;
            box-shadow: var(--shadow-lg); max-height: 80vh; overflow-y: auto;
        }
        .modal .modal-title {
            font-size: 18px; font-weight: 700; text-align: center;
            margin-bottom: 16px; color: var(--text-primary);
        }
        .form-group {
            margin-bottom: 14px;
        }
        .form-group label {
            display: block; font-size: 13px; font-weight: 600;
            color: var(--text-secondary); margin-bottom: 4px;
        }
        .form-group input {
            width: 100%; padding: 10px 14px; border: 1px solid var(--border);
            border-radius: 10px; font-size: 14px; color: var(--text-primary);
            transition: var(--transition); outline: none;
            -webkit-appearance: none;
        }
        .form-group input:focus {
            border-color: var(--brand-green);
            box-shadow: 0 0 0 3px rgba(0,184,148,0.1);
        }
        .form-hint {
            font-size: 11px; color: var(--text-muted); margin-top: 2px;
        }
        .modal-btns {
            display: flex; gap: 10px; justify-content: center; margin-top: 8px;
        }
        .modal-btns button {
            padding: 10px 24px; border-radius: 20px;
            font-size: 14px; font-weight: 600; border: none;
            cursor: pointer; transition: var(--bounce);
        }
        .modal-btns button:active { transform: scale(0.93); }
        .btn-cancel { background: #f1f2f6; color: var(--text-secondary); }
        .btn-submit { background: var(--brand-green); color: #fff; }

        /* Toast */
        .toast {
            position: fixed; top: 50%; left: 50%;
            transform: translate(-50%, -50%) scale(0.8);
            background: #333; color: #fff;
            padding: 10px 20px; border-radius: 20px;
            font-size: 13px; z-index: 200; opacity: 0;
            pointer-events: none; transition: all 0.3s ease;
            white-space: nowrap;
        }
        .toast.show { opacity:1; transform: translate(-50%, -50%) scale(1); }

        /* 连接状态 */
        #connection-status {
            text-align: center; padding: 8px; font-size: 11px;
            font-weight: 600; border-radius: 8px; margin-bottom: 12px;
        }
        .cta-card {
            background: var(--card); border-radius: var(--radius-xl);
            padding: 24px; text-align: center; box-shadow: var(--shadow);
            margin-bottom: 16px;
        }
        .cta-card .cta-icon { font-size: 48px; margin-bottom: 8px; }
        .cta-card .cta-title { font-size: 17px; font-weight: 700; color: var(--text-primary); margin-bottom: 4px; }
        .cta-card .cta-desc { font-size: 13px; color: var(--text-secondary); margin-bottom: 16px; line-height: 1.5; }

        @media (max-width: 420px) {
            .phone-frame { width:100%; height:100vh; max-height:100vh; border-radius:0; padding:0; box-shadow:none; background:transparent; }
            .phone-screen { border-radius:0; }
        }
    </style>
</head>
<body>
    <div class="phone-frame">
        <div class="phone-screen">
            <div class="status-bar">
                <span>9:41</span>
                <span>📶 🔋 85%</span>
            </div>

            <div class="main-content" id="mainContent">

                <!-- 连接状态指示 -->
                <div id="connection-status" style="background:#fff0ef; color:#d63031;">⏳ 正在连接数据库...</div>

                <!-- 首页 CTA 卡片 -->
                <div class="cta-card">
                    <div class="cta-icon">🅿️</div>
                    <div class="cta-title">邻停易 · 车位互助平台</div>
                    <div class="cta-desc">让跨区通勤的车主，在彼此闲置时段互换车位使用权。<br>不是出租，是邻里互助。</div>
                    <button class="btn btn-primary btn-block" onclick="openBookingForm()">
                        📋 预约互换车位
                    </button>
                    <p style="font-size:11px;color:var(--text-muted);margin-top:8px;">首批试点：重庆 · 照母山 ↔ 汽博</p>
                </div>

                <!-- 快速跳转链接 -->
                <div style="text-align:center;">
                    <a href="https://tannind.github.io/lintingyi-demo/" style="color:var(--brand-blue);font-size:13px;text-decoration:none;">🔄 返回主 DEMO 页面</a>
                </div>
            </div>
        </div>
    </div>

    <!-- 预约表单弹窗 -->
    <div class="overlay hidden" id="bookingOverlay">
        <div class="modal">
            <div class="modal-title">📋 预约互换车位</div>
            <form id="bookingForm" onsubmit="return submitBooking(event)">
                <div class="form-group">
                    <label>姓名 *</label>
                    <input type="text" id="name" placeholder="请输入你的姓名" required>
                </div>
                <div class="form-group">
                    <label>手机号 *</label>
                    <input type="tel" id="phone" placeholder="请输入手机号" required pattern="[0-9]{11}" maxlength="11">
                    <div class="form-hint">仅用于互换匹配通知，严格保密</div>
                </div>
                <div class="form-group">
                    <label>车牌号</label>
                    <input type="text" id="car_number" placeholder="如：渝A·12345">
                </div>
                <div class="form-group">
                    <label>家庭地址 *</label>
                    <input type="text" id="home_address" placeholder="你的小区名称" required>
                </div>
                <div class="form-group">
                    <label>工作地址 *</label>
                    <input type="text" id="work_address" placeholder="上班地点" required>
                </div>
                <div class="form-group">
                    <label>可互换时段 *</label>
                    <input type="text" id="time_slot" placeholder="如：工作日 8:00-18:00" required>
                </div>
                <div class="modal-btns">
                    <button type="button" class="btn-cancel" onclick="closeBookingForm()">取消</button>
                    <button type="submit" class="btn-submit" id="submitBtn">提交预约</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Toast 提示 -->
    <div class="toast" id="toast"></div>

    <!-- Supabase SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        // ============ Supabase 初始化 ============
        const SUPABASE_URL = 'https://prmhoyvyxthqlrjkeoho.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBybWhveXZ5eHRocWxyamtlb2hvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIzOTY3NzQsImV4cCI6MjA5Nzk3Mjc3NH0.DWkUXWzNnA_MmBcLZ7tiPXUUyMLqmJEtxc2Nk-q_O44';
        const client = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // ============ 连接检测 ============
        async function checkConnection() {
            const el = document.getElementById('connection-status');
            const { data, error } = await client.from('feedbacks').select('*').limit(1);
            if (error) {
                el.textContent = '⚠️ 数据库连接失败: ' + error.message;
                el.style.background = '#fff0ef';
                el.style.color = '#d63031';
            } else {
                el.textContent = '✅ 数据库已连接 · 点击下方按钮预约互换车位';
                el.style.background = '#e6f9f4';
                el.style.color = '#00a381';
            }
        }
        window.addEventListener('load', checkConnection);

        // ============ 弹窗控制 ============
        function openBookingForm() {
            document.getElementById('bookingOverlay').classList.remove('hidden');
        }
        function closeBookingForm() {
            document.getElementById('bookingOverlay').classList.add('hidden');
            document.getElementById('bookingForm').reset();
        }
        // 点击遮罩关闭
        document.getElementById('bookingOverlay').addEventListener('click', function(e) {
            if (e.target === this) closeBookingForm();
        });

        // ============ 表单提交 ============
        async function submitBooking(event) {
            event.preventDefault();
            const submitBtn = document.getElementById('submitBtn');
            submitBtn.textContent = '提交中...';
            submitBtn.disabled = true;
            submitBtn.style.opacity = '0.6';

            const formData = {
                name: document.getElementById('name').value.trim(),
                phone: document.getElementById('phone').value.trim(),
                car_number: document.getElementById('car_number').value.trim() || null,
                home_address: document.getElementById('home_address').value.trim(),
                work_address: document.getElementById('work_address').value.trim(),
                time_slot: document.getElementById('time_slot').value.trim(),
            };

            const { data, error } = await client
                .from('swap_requests')
                .insert([formData])
                .select();

            submitBtn.textContent = '提交预约';
            submitBtn.disabled = false;
            submitBtn.style.opacity = '1';

            if (error) {
                showToast('提交失败: ' + error.message);
                console.error('提交失败:', error);
            } else {
                showToast('✅ 预约成功！我们会尽快为你匹配互换伙伴。');
                console.log('提交成功:', data);
                closeBookingForm();
            }
            return false;
        }

        // ============ Toast ============
        let toastTimer = null;
        function showToast(msg) {
            const toast = document.getElementById('toast');
            if (toastTimer) clearTimeout(toastTimer);
            toast.textContent = msg;
            toast.classList.add('show');
            toastTimer = setTimeout(() => {
                toast.classList.remove('show');
            }, 2500);
        }
    </script>
</body>
</html>
