<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="邻停易">
    <title>邻停易 - 车位互换共享平台</title>
    <style>
        :root {
            --brand-green: #34C759;
            --brand-blue: #007AFF;
            --warning: #FF3B30;
            --orange: #FF9500;
            --bg: #F2F2F7;
            --card: #FFFFFF;
            --text-primary: #1C1C1E;
            --text-secondary: #8E8E93;
            --text-muted: #C7C7CC;
            --border: #E5E5EA;
            --shadow: 0 2px 10px rgba(0,0,0,0.03);
            --shadow-lg: 0 10px 30px rgba(0,0,0,0.12);
            --radius-xl: 16px;
            --font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'PingFang SC', sans-serif;
        }
        * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: var(--font-family); background: #000; display: flex; align-items: center; justify-content: center; min-height: 100vh; user-select: none; padding: 10px; }
        .phone-frame { width: 390px; max-width: 100%; height: 844px; max-height: 95vh; background: #000; border-radius: 48px; padding: 12px; box-shadow: 0 30px 80px rgba(0,0,0,0.5); border: 2px solid #333; }
        .phone-screen { width: 100%; height: 100%; background: var(--bg); border-radius: 36px; overflow: hidden; display: flex; flex-direction: column; position: relative; }
        
        .status-bar { height: calc(44px + env(safe-area-inset-top)); padding: env(safe-area-inset-top) 24px 0 32px; display: flex; align-items: center; justify-content: space-between; font-size: 15px; font-weight: 600; flex-shrink: 0; background: rgba(242, 242, 247, 0.8); backdrop-filter: saturate(180%) blur(20px); z-index: 10; }
        .status-bar svg { width: 18px; height: 18px; fill: var(--text-primary); margin-left: 5px; }
        .status-right { display: flex; align-items: center; }
        
        .main-content { flex:1; overflow-y:auto; overflow-x:hidden; -webkit-overflow-scrolling:touch; padding: 0 16px calc(100px + env(safe-area-inset-bottom)); }
        .page { display:none; }
        .page.active { display:block; animation: crossFade 0.3s ease forwards; }
        @keyframes crossFade { from { opacity:0.5; } to { opacity:1; } }
        
        .large-title { font-size: 32px; font-weight: 800; color: var(--text-primary); padding: 16px 4px 12px; letter-spacing: -0.5px; }
        .section-title { font-size: 13px; font-weight: 600; color: var(--text-secondary); margin-bottom: 10px; margin-top: 24px; padding-left: 4px; text-transform: uppercase; letter-spacing: 0.5px; }
        
        .bottom-nav { position: absolute; bottom:0; left:0; right:0; background: rgba(255, 255, 255, 0.72); backdrop-filter: saturate(180%) blur(20px); display: flex; align-items: flex-start; justify-content: space-around; padding-top: 8px; z-index: 20; border-top: 0.5px solid var(--border); height: calc(83px + env(safe-area-inset-bottom)); padding-bottom: env(safe-area-inset-bottom); }
        .nav-item { display: flex; flex-direction: column; align-items: center; gap: 4px; cursor: pointer; padding: 4px 12px; color: var(--text-secondary); }
        .nav-item svg { width: 26px; height: 26px; stroke-width: 1.5; transition: 0.2s; }
        .nav-item .nav-label { font-size: 10px; font-weight: 500; }
        .nav-item.active { color: var(--brand-green); }
        .nav-item.active svg { stroke-width: 2.5; transform: translateY(-1px); }
        .nav-item.active .nav-label { font-weight: 600; }
        
        .card { background: var(--card); border-radius: var(--radius-xl); padding: 16px; margin-bottom: 12px; box-shadow: var(--shadow); border: 0.5px solid rgba(0,0,0,0.04); }
        .btn { display: inline-flex; align-items: center; justify-content: center; gap: 6px; padding: 14px 24px; border-radius: 14px; font-size: 16px; font-weight: 600; border: none; cursor: pointer; transition: 0.2s; width: 100%; background: var(--brand-green); color: #fff; }
        .btn:active { opacity: 0.7; transform: scale(0.98); }
        .btn-outline { background: rgba(0,122,255,0.08); color: var(--brand-blue); }
        .btn-cancel { background: var(--bg); color: var(--brand-blue); }
        
        .city-bar { display: flex; align-items: center; gap: 4px; font-size: 15px; font-weight: 600; margin-bottom: 8px; cursor: pointer; width: fit-content; padding: 6px 10px; margin-left: -6px; border-radius: 10px; }
        .city-bar:active { background: rgba(0,0,0,0.05); }
        .parking-card { text-align: center; cursor: pointer; padding: 24px 16px; }
        .parking-card:active { transform: scale(0.98); }
        .status-ring { width: 80px; height: 80px; border-radius: 24px; display: flex; align-items: center; justify-content: center; margin: 0 auto 16px; background: #E8F8EE; }
        .status-ring.free svg { stroke: var(--brand-green); }
        .status-ring.occupied { background: #E8F0FE; }
        .status-ring.occupied svg { stroke: var(--brand-blue); }
        .status-ring.swapping { background: #FFF4E6; }
        .status-ring.swapping svg { stroke: var(--orange); }
        .status-ring svg { width: 36px; height: 36px; fill: none; stroke-width: 1.5; }
        
        .status-title { font-size: 20px; font-weight: 700; margin-bottom: 4px; letter-spacing: -0.3px; }
        .status-subtitle { font-size: 14px; color: var(--text-secondary); margin-bottom: 20px; }
        
        .quick-actions { display: flex; gap: 10px; flex-wrap: wrap; }
        .quick-chip { display: flex; align-items: center; gap: 8px; background: var(--card); padding: 10px 16px; border-radius: 20px; font-size: 14px; font-weight: 500; box-shadow: var(--shadow); cursor: pointer; border: 0.5px solid var(--border); }
        .quick-chip:active { transform: scale(0.95); background: #f0f0f5; }
        .quick-chip svg { width: 18px; height: 18px; fill: var(--brand-blue); }

        .timeline-scroll { display: flex; gap: 12px; overflow-x: auto; padding-bottom: 8px; }
        .timeline-scroll::-webkit-scrollbar { display: none; }
        .timeline-card { min-width: 160px; background: var(--card); border-radius: 12px; padding: 14px; border: 0.5px solid var(--border); }
        .tl-time { font-size: 12px; font-weight: 700; margin-bottom: 6px; display: flex; align-items: center; gap: 4px; }
        .tl-text { font-size: 13px; line-height: 1.4; }

        .ios-list { background: var(--card); border-radius: var(--radius-xl); overflow: hidden; box-shadow: var(--shadow); margin-top: 8px; border: 0.5px solid rgba(0,0,0,0.04); }
        .ios-item { display: flex; align-items: center; gap: 12px; padding: 12px 16px; cursor: pointer; border-bottom: 0.5px solid var(--border); font-size: 16px; min-height: 58px; }
        .ios-item:last-child { border-bottom: none; }
        .ios-item:active { background: #f0f0f5; }
        .icon-box { width: 32px; height: 32px; border-radius: 8px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
        .icon-box svg { width: 18px; height: 18px; stroke: #fff; stroke-width: 2; fill: none; }
        .menu-arrow { margin-left: auto; color: var(--text-muted); }
        .menu-arrow svg { width: 12px; height: 12px; stroke: var(--text-muted); stroke-width: 2.5; fill: none; }
        .badge-right { margin-left: auto; font-weight: 600; font-size: 13px; }
        .badge-right.locked { color: var(--text-secondary); opacity: 0.5; }

        .tab-switch { display: flex; background: #EDEDF0; border-radius: 10px; padding: 3px; margin: 16px 0; }
        .tab-btn { flex: 1; padding: 8px; border-radius: 8px; border: none; background: transparent; font-size: 13px; font-weight: 600; color: var(--text-secondary); cursor: pointer; }
        .tab-btn.active { background: #fff; color: var(--text-primary); box-shadow: 0 1px 2px rgba(0,0,0,0.1); }

        .swap-card { padding: 18px; position: relative; transition: transform 0.4s ease, opacity 0.4s ease; touch-action: pan-y; }
        .match-badge { background: #E8F8EE; color: var(--brand-green); font-size: 12px; font-weight: 700; padding: 4px 10px; border-radius: 8px; float: right; }
        .user-row { display: flex; align-items: center; gap: 12px; margin-bottom: 14px; }
        .avatar { width: 44px; height: 44px; border-radius: 50%; background: linear-gradient(135deg, #5E5CE6, #007AFF); display: flex; align-items: center; justify-content: center; font-size: 18px; font-weight: 700; color: #fff; }
        .swap-route { display: flex; align-items: center; gap: 8px; font-size: 13px; color: var(--text-secondary); padding: 10px 12px; background: var(--bg); border-radius: 8px; margin: 8px 0; flex-wrap: wrap; }
        .tag-row { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 10px; }
        .tag { font-size: 11px; padding: 4px 10px; border-radius: 6px; background: #F0F0F5; color: var(--text-secondary); font-weight: 500; }
        .card-actions { display: flex; gap: 10px; margin-top: 16px; }
        .btn-pass, .btn-like { flex: 1; padding: 12px; border-radius: 12px; font-size: 14px; font-weight: 600; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 6px;}
        .btn-pass { background: var(--bg); color: var(--text-secondary); }
        .btn-like { background: var(--brand-green); color: #fff; }

        .overlay { position: fixed; top:0; left:0; right:0; bottom:0; background: rgba(0,0,0,0.4); z-index:100; display:flex; align-items:center; justify-content:center; padding: 20px; opacity: 0; visibility: hidden; transition: opacity 0.2s ease, visibility 0.2s ease; }
        .overlay.show { opacity: 1; visibility: visible; }
        .modal { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(20px); border-radius: 20px; padding: 20px; width: 100%; max-width: 340px; box-shadow: var(--shadow-lg); max-height: 85vh; overflow-y: auto; transform: scale(0.9); transition: transform 0.3s cubic-bezier(0.32, 0.72, 0, 1); }
        .overlay.show .modal { transform: scale(1); }
        .modal-title { font-size: 18px; font-weight: 700; text-align: center; margin-bottom: 20px; }
        .form-group { margin-bottom: 16px; }
        .form-group label { display: block; font-size: 13px; font-weight: 600; color: var(--text-secondary); margin-bottom: 6px; padding-left: 4px; }
        .ios-input { width: 100%; padding: 14px 16px; background: #F2F2F7; border: 1px solid transparent; border-radius: 12px; font-size: 16px; outline: none; font-family: inherit; transition: 0.2s; }
        .ios-input:focus { border-color: var(--brand-blue); background: #fff; box-shadow: 0 0 0 4px rgba(0,122,255,0.1); }
        textarea.ios-input { resize: none; min-height: 80px; }
        .modal-btns { display: flex; flex-direction: column; gap: 10px; margin-top: 24px; }
        
        .msg-item { display: flex; gap: 12px; padding: 14px 0; border-bottom: 0.5px solid var(--border); cursor: pointer; }
        .msg-item:last-child { border: none; }
        .msg-icon { width: 40px; height: 40px; border-radius: 12px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
        .msg-content { flex: 1; min-width: 0; }
        .msg-title { font-weight: 600; font-size: 15px; margin-bottom: 2px; }
        .msg-preview { font-size: 13px; color: var(--text-secondary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .msg-time { font-size: 12px; color: var(--text-secondary); flex-shrink: 0; }

        .credit-circle { width: 140px; height: 140px; border-radius: 50%; background: conic-gradient(var(--brand-green) 0% 85%, #E5E5EA 85% 100%); display: flex; align-items: center; justify-content: center; margin: 20px auto 16px; position: relative; }
        .credit-circle::before { content: ''; position: absolute; width: 110px; height: 110px; background: #fff; border-radius: 50%; }
        .score-inner { position: relative; z-index: 1; text-align: center; }
        .score-num { font-size: 40px; font-weight: 800; line-height: 1; }
        .score-label { font-size: 12px; color: var(--text-secondary); margin-top: 4px; }

        .conn-status { text-align: center; padding: 8px; font-size: 12px; font-weight: 600; border-radius: 10px; margin-bottom: 12px; }
        .conn-status.loading { background: #FFF4E6; color: var(--orange); }
        .conn-status.error { background: #FFF0F0; color: var(--warning); }
        .conn-status.success { background: #E8F8EE; color: var(--brand-green); }

        @media (max-width: 420px) {
            body { padding: 0; background: var(--bg); }
            .phone-frame { width: 100%; height: 100vh; max-height: 100vh; border-radius: 0; padding: 0; box-shadow: none; border: none; }
            .phone-screen { border-radius: 0; }
        }
    </style>
</head>

<script>
    const App = {
        supabase: supabase.createClient('https://prmhoyvyxthqlrjkeoho.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBybWhveXZ5eHRocWxyamtlb2hvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIzOTY3NzQsImV4cCI6MjA5Nzk3Mjc3NH0.DWkUXWzNnA_MmBcLZ7tiPXUUyMLqmJEtxc2Nk-q_O44'),
        ADMIN_HASH: '240be518fabd2724ddb6f04eeb1da5967448d7e831c08c8fa822809f74c720a9',
        FORM_FIELDS: ['name', 'phone', 'car_number', 'home_address', 'work_address', 'time_slot', 'content', 'device_sn'],

            currentUserPhone: localStorage.getItem('currentUserPhone') || '',

            park: '<svg viewBox="0 0 24 24"><rect x="4" y="4" width="16" height="16" rx="2" stroke="currentColor" stroke-width="1.5" fill="none"/><text x="12" y="16" font-size="10" text-anchor="middle" fill="currentColor" stroke="none">P</text></svg>',
            swap: '<svg viewBox="0 0 24 24"><polyline points="17 1 21 5 17 9"></polyline><path d="M3 11V9a4 4 0 0 1 4-4h14"></path><polyline points="7 23 3 19 7 15"></polyline><path d="M21 13v2a4 4 0 0 1-4 4H3"></path></svg>'

        init() {
            document.getElementById('statusRing').innerHTML = this.icons.park;
            this.checkConnection();
            this.loadUserProfile();
            this.bindEvents();
        },

        async safeCall(fn, errorMsg = '操作失败') {
            try { return await fn(); } 
            catch (err) { console.error(err); this.showToast('⚠️ ' + errorMsg); return { data: null, error: err }; }
        },

        showToast(msg) {
            const toast = document.getElementById('toast');
            clearTimeout(this.toastTimer);
            toast.textContent = msg;
            toast.style.opacity = 1;
            toast.style.transform = 'translate(-50%,-50%) scale(1)';
            if (navigator.vibrate) navigator.vibrate(15);
            this.toastTimer = setTimeout(() => {
                toast.style.opacity = 0;
                toast.style.transform = 'translate(-50%,-50%) scale(0.8)';
            }, 2000);
        },

        async checkConnection() {
            const el = document.getElementById('conn-status');
            const { error } = await this.safeCall(() => this.supabase.from('feedbacks').select('*').limit(1), '连接超时');
            el.className = 'conn-status ' + (error ? 'error' : 'success');
            el.textContent = error ? '⚠️ 连接失败' : '✅ 数据库已连接';
        },

        openModal(targetId) {
            const overlay = document.getElementById(targetId);
            if (!overlay) return;
            if (overlay.children.length === 0) {
                const tplId = 'tpl-' + targetId.replace('Overlay', '');
                const tpl = document.getElementById(tplId);
                if (tpl) overlay.appendChild(tpl.content.cloneNode(true));
            }
            if (targetId === 'profileOverlay') this.fillProfileForm();
            if (targetId === 'inviteOverlay') document.getElementById('inviteCode').textContent = this.state.currentUserPhone || '未设置手机号';
            overlay.classList.add('show');
        },

        closeModal(targetEl) {
            const overlay = targetEl.closest('.overlay');
            if (overlay) overlay.classList.remove('show');
        },

        getFormData(formEl) {
            const data = {};
            this.FORM_FIELDS.forEach(field => {
                const el = formEl.querySelector(`[name="${field}"]`);
                if (el) data[field] = el.value.trim();
            });
            return data;
        },

        async handleSubmit(formEl) {
            const type = formEl.dataset.form;
            if (type === 'booking') return this.submitBooking(formEl);
            if (type === 'feedback') return this.submitFeedback(formEl);
            if (type === 'profile') return this.saveProfile(formEl);
        },

        async submitBooking(form) {
            const data = this.getFormData(form);
            const { error } = await this.safeCall(() => this.supabase.from('swap_requests').insert([data]));
            if (!error) { this.showToast('✅ 预约成功！'); this.closeModal(form); }
        },

        async submitFeedback(form) {
            const data = this.getFormData(form);
            const payload = { content: data.content, rating: this.state.feedbackRating, user_id: this.state.currentUserPhone || 'anonymous' };
            const { error } = await this.safeCall(() => this.supabase.from('feedbacks').insert([payload]));
            if (!error) { this.showToast('✅ 感谢反馈！'); this.closeModal(form); }
        },

        async fillProfileForm() {
            if (!this.state.currentUserPhone) return;
            const { data } = await this.safeCall(() => this.supabase.from('user_profiles').select('*').eq('phone', this.state.currentUserPhone).single());
            const form = document.querySelector('#profileOverlay form');
            if (data && form) {
                this.FORM_FIELDS.forEach(f => { if (form[f]) form[f].value = data[f] || ''; });
            }
        },

        async saveProfile(form) {
            const data = this.getFormData(form);
            const { error } = await this.safeCall(() => this.supabase.from('user_profiles').upsert(data, { onConflict: 'phone' }));
            if (!error) {
                this.state.currentUserPhone = data.phone;
                localStorage.setItem('currentUserPhone', data.phone);
                this.loadUserProfile();
                this.showToast('✅ 保存成功！');
                this.closeModal(form);
            }
        },

        async loadUserProfile() {
            if (!this.state.currentUserPhone) return;
            const { data } = await this.safeCall(() => this.supabase.from('user_profiles').select('*').eq('phone', this.state.currentUserPhone).single());
            if (data) {
                document.getElementById('profileName').textContent = data.name || '邻停易用户';
                document.getElementById('profilePhone').textContent = data.phone;
                document.getElementById('profileAvatar').textContent = (data.name || '邻')[0];
            }
        },

        async verifyAdmin() {
            const input = document.getElementById('adminPassword').value;
            const hashBuffer = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(input));
            const hashHex = Array.from(new Uint8Array(hashBuffer)).map(b => b.toString(16).padStart(2, '0')).join('');
            if (hashHex === this.ADMIN_HASH) {
                this.closeModal(document.getElementById('adminPassword'));
                this.openModal('adminPanelOverlay');
                this.switchAdminTab('swap');
            } else { this.showToast('❌ 密码错误'); }
        },

        async switchAdminTab(tab) {
            document.querySelectorAll('#adminTabs .tab-btn').forEach(b => b.classList.toggle('active', b.dataset.adminTab === tab));
            const table = tab === 'swap' ? 'swap_requests' : 'feedbacks';
            const { data } = await this.safeCall(() => this.supabase.from(table).select('*').order('created_at', { ascending: false }));
            const container = document.getElementById('adminTableContainer');
            if (!data || data.length === 0) { container.innerHTML = '<div style="text-align:center;color:var(--text-muted);padding:20px;">暂无记录</div>'; return; }
            container.innerHTML = data.map(item => {
                if (tab === 'swap') return `<div class="card" style="padding:14px;margin-bottom:8px;"><b>${item.name}</b> · ${item.phone}<br><span style="font-size:13px;color:var(--text-secondary);">${item.home_address} → ${item.work_address}</span><br><button style="color:var(--warning);margin-top:8px;font-size:13px;border:none;background:none;" data-action="delete-record" data-table="swap_requests" data-id="${item.id}">删除</button></div>`;
                else return `<div class="card" style="padding:14px;margin-bottom:8px;"><b>${item.user_id || '匿名'}</b> · 评分：${item.rating}<br><span style="font-size:13px;color:var(--text-secondary);">${item.content}</span><br><button style="color:var(--warning);margin-top:8px;font-size:13px;border:none;background:none;" data-action="delete-record" data-table="feedbacks" data-id="${item.id}">删除</button></div>`;
            }).join('');
        },

        async deleteRecord(table, id) {
            await this.safeCall(() => this.supabase.from(table).delete().eq('id', id));
            this.showToast('已删除');
            this.switchAdminTab(table === 'swap_requests' ? 'swap' : 'feedback');
        },

            const container = document.getElementById('mySwapsList');

                <div class="card" style="padding:14px;"><b>${item.name}</b> · ${item.phone}<br>

        toggleParking() {

                    <div class="user-row"><div class="avatar">${c.name[0]}</div><div><b style="font-size:16px;">${c.name}</b><div style="font-size:12px;color:var(--brand-green);font-weight:600;">★ ${c.credit} 信用分</div></div></div>

                </div>`).join('');
            this.bindSwipeGestures();
        },

        bindSwipeGestures() {
            document.querySelectorAll('.swap-card').forEach(card => {
                let startX = 0, moveX = 0;
                card.addEventListener('touchstart', (e) => {
                    if (e.target.closest('button')) return;
                    startX = e.touches[0].clientX;
                    card.style.transition = 'none';
                }, { passive: true });
                
                card.addEventListener('touchmove', (e) => {
                    if (e.target.closest('button')) return;
                    moveX = e.touches[0].clientX - startX;
                    card.style.transform = `translateX(${moveX}px) rotate(${moveX/20}deg)`;
                }, { passive: true });
                
                card.addEventListener('touchend', () => {
                    card.style.transition = 'transform 0.4s ease, opacity 0.4s ease';
                    if (moveX > 100) this.swipeCard('like', card.id);
                    else if (moveX < -100) this.swipeCard('pass', card.id);
                    else card.style.transform = 'translateX(0) rotate(0)';
                });
            });
        },

        swipeCard(type, id) {
            const card = document.getElementById(id);
            if (!card) return;
            card.style.transform = type === 'like' ? 'translateX(120%) rotate(10deg)' : 'translateX(-120%) rotate(-10deg)';

                <div class="section-title">车友私信</div>
                <div class="card" style="padding:0 16px;">
                    <div class="msg-item" data-action="show-msg-detail" data-title="张先生" data-content="好的，我准时到。\n如果你那边地锁降不下来，可以随时给我打电话，我远程帮你开。">
                        <div class="msg-icon" style="background:#007AFF;font-weight:600;font-size:16px;color:#fff;">张</div>
                        <div class="msg-content"><div class="msg-title">张先生</div><div class="msg-preview">好的，我准时到</div></div><div class="msg-time">昨天</div>
                    </div>
                    <div class="msg-item" data-action="show-msg-detail" data-title="李女士" data-content="谢谢你把车位换给我，今天下雨，离公司近多了，太感谢啦！\n下次有需要再找你换~">
                        <div class="msg-icon" style="background:#FF9500;font-weight:600;font-size:16px;color:#fff;">李</div>
                        <div class="msg-content"><div class="msg-title">李女士</div><div class="msg-preview">谢谢换车位，太方便了</div></div><div class="msg-time">3天前</div>
                    </div>
                </div>
                <div class="section-title">官方公告</div>
                <div class="card" style="padding:0 16px;">
                    <div class="msg-item" data-action="show-msg-detail" data-title="邻停易 V1.2 更新公告" data-content="本次更新内容：\n1. 新增信用分特权体系，高信用用户享免押金等权益；\n2. 优化了互换卡片的滑动体验；\n3. 修复了部分机型无法降锁的问题。\n感谢您的支持！">
                        <div class="msg-icon" style="background:#8E8E93;"><svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="16" x2="12" y2="12"></line><line x1="12" y1="8" x2="12.01" y2="8"></line></svg></div>
                        <div class="msg-content"><div class="msg-title">邻停易 V1.2 更新</div><div class="msg-preview">新增信用分体系，体验优化</div></div><div class="msg-time">2天前</div>
                    </div>
                </div>`;
        },

        // 补全信用特权列表（恢复800分免罚）
        renderCreditPage() {
            document.getElementById('page-credit').innerHTML = `
                <div class="large-title">信用中心</div>
                <div class="card" style="text-align:center;padding:30px 16px;">
                    <div class="credit-circle"><div class="score-inner"><div class="score-num">632</div><div class="score-label">信用分</div></div></div>
                    <div style="display:inline-block;padding:6px 16px;background:#FFF4E6;color:var(--orange);border-radius:12px;font-weight:700;font-size:14px;margin-top:8px;">⭐ 信用优秀</div>
                </div>
                <div class="section-title">我的特权</div>
                <div class="ios-list">
                    <div class="ios-item"><div class="icon-box" style="background:#34C759;"><svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"></polyline></svg></div>优先匹配权<span class="badge-right" style="color:var(--brand-green);">已解锁</span></div>
                    <div class="ios-item" style="opacity:0.5;"><div class="icon-box" style="background:#8E8E93;"><svg viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg></div>免押金互换<span class="badge-right locked">700分解锁</span></div>
                    <div class="ios-item" style="opacity:0.5;"><div class="icon-box" style="background:#8E8E93;"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg></div>每月1次超时免罚<span class="badge-right locked">800分解锁</span></div>
                </div>`;
        },

        switchPage(page) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById('page-'+page).classList.add('active');
            document.querySelectorAll('.nav-item').forEach(n => n.classList.toggle('active', n.dataset.page === page));
            document.getElementById('mainContent').scrollTop = 0;
            
            if (page === 'swap' && !this.state.cachedPages.swap) { this.renderRecommendCards(); this.state.cachedPages.swap = true; }
            if (page === 'msg' && !this.state.cachedPages.msg) { this.renderMessages(); this.state.cachedPages.msg = true; }
            if (page === 'credit' && !this.state.cachedPages.credit) { this.renderCreditPage(); this.state.cachedPages.credit = true; }
        },

        switchSwapTab(tab) {
            document.querySelectorAll('#swapTabs .tab-btn').forEach(b => b.classList.toggle('active', b.dataset.tab === tab));
            document.getElementById('swap-recommend').style.display = tab === 'recommend' ? 'block' : 'none';
            document.getElementById('swap-ongoing').style.display = tab === 'ongoing' ? 'block' : 'none';
            document.getElementById('swap-history').style.display = tab === 'history' ? 'block' : 'none';
        },

        bindEvents() {
            document.body.addEventListener('click', (e) => {
                const target = e.target.closest('[data-action]');
                if (!target) return;
                const action = target.dataset.action;

                switch(action) {
                    case 'show-toast': this.showToast(target.dataset.msg); break;
                    case 'show-msg-detail': 
                        this.openModal('msgDetailOverlay');
                        document.getElementById('msgDetailTitle').textContent = target.dataset.title;
                        // 将文本中的 \n 替换为 <br> 以实现换行
                        document.getElementById('msgDetailContent').innerHTML = target.dataset.content.replace(/\n/g, '<br>');
                        break;
                    case 'toggle-parking': this.toggleParking(); break;
                    case 'handle-status': e.stopPropagation(); this.showToast('📢 闲置时段已发布！'); break;
                    case 'open-modal': this.openModal(target.dataset.target); break;
                    case 'close-modal': this.closeModal(target); break;
                    case 'mock-scan': this.closeModal(target); this.showToast('✅ 验证通过，地锁已降下'); break;
                    case 'verify-admin': this.verifyAdmin(); break;
                    case 'delete-record': this.deleteRecord(target.dataset.table, target.dataset.id); break;
                    case 'load-my-swaps': this.loadMySwaps(); break;
                    case 'swipe-card': this.swipeCard(target.dataset.type, target.dataset.id); break;
                    case 'rate-star': 
                        this.state.feedbackRating = parseInt(target.dataset.value);
                        document.querySelectorAll('#starRating .star').forEach(s => s.classList.toggle('active', parseInt(s.dataset.value) <= this.state.feedbackRating));
                        break;
                    case 'copy-invite': 
                        navigator.clipboard?.writeText(document.getElementById('inviteCode').textContent).then(() => this.showToast('已复制邀请码')); 
                        break;
                }
            });

            document.getElementById('bottomNav').addEventListener('click', (e) => {
                const item = e.target.closest('.nav-item'); if (item) this.switchPage(item.dataset.page);
            });
            document.getElementById('swapTabs').addEventListener('click', (e) => {
                const btn = e.target.closest('.tab-btn'); if (btn) this.switchSwapTab(btn.dataset.tab);
            });
            document.getElementById('adminPanelOverlay').addEventListener('click', (e) => {
                const btn = e.target.closest('[data-admin-tab]'); if (btn) this.switchAdminTab(btn.dataset.adminTab);
            });

            document.body.addEventListener('submit', (e) => {
                const form = e.target.closest('form[data-form]');
                if (form) { e.preventDefault(); this.handleSubmit(form); }
            });

            document.querySelectorAll('.overlay').forEach(ov => {
                ov.addEventListener('click', (e) => { if (e.target === ov) ov.classList.remove('show'); });
            });
        }
    };

    window.addEventListener('load', () => App.init());
</script>
</body>
</html>
