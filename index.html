<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <!-- 三、移动端适配：增加 viewport-fit=cover 以支持安全区 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <!-- 三、移动端适配：PWA 添加到主屏幕配置 -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="邻停易">
    <title>邻停易 - 车位互换共享平台</title>
    <style>
        :root {
            --brand-green: #34C759;
            --brand-green-dark: #2EA84C;
            --brand-blue: #007AFF;
            --warning: #FF3B30;
            --bg: #F2F2F7;
            --card: #FFFFFF;
            --text-primary: #1C1C1E;
            --text-secondary: #8E8E93;
            --text-muted: #C7C7CC;
            --border: #E5E5EA;
            --shadow: 0 2px 10px rgba(0,0,0,0.03);
            --shadow-lg: 0 10px 30px rgba(0,0,0,0.12);
            --radius: 12px;
            --radius-xl: 16px;
            --font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'SF Pro Display', 'PingFang SC', 'Helvetica Neue', sans-serif;
        }
        * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color: transparent; }
        body {
            font-family: var(--font-family);
            background: #000;
            display: flex; align-items: center; justify-content: center;
            min-height: 100vh; user-select: none; -webkit-user-select: none; padding: 10px;
        }
        .phone-frame {
            width: 390px; max-width: 100%; height: 844px; max-height: 95vh;
            background: #000; border-radius: 48px; padding: 12px;
            box-shadow: 0 30px 80px rgba(0,0,0,0.5); border: 2px solid #333;
        }
        .phone-screen {
            width: 100%; height: 100%; background: var(--bg);
            border-radius: 36px; overflow: hidden; display: flex; flex-direction: column;
            position: relative;
        }
        .status-bar {
            height: 44px; display: flex; align-items: center; justify-content: space-between;
            padding: 0 24px 0 32px; font-size: 15px; font-weight: 600; flex-shrink: 0;
            background: rgba(242, 242, 247, 0.8); backdrop-filter: saturate(180%) blur(20px);
            -webkit-backdrop-filter: saturate(180%) blur(20px); z-index: 10;
            /* 三、适配顶部安全区 */
            padding-top: env(safe-area-inset-top);
            height: calc(44px + env(safe-area-inset-top));
        }
        .status-bar svg { width: 18px; height: 18px; fill: var(--text-primary); margin-left: 5px; }
        .status-right { display: flex; align-items: center; }
        
        /* 二、页面切换动画优化：Tab交叉淡入 */
        .main-content { flex:1; overflow-y:auto; overflow-x:hidden; -webkit-overflow-scrolling:touch; padding: 0 16px; 
            /* 三、适配底部安全区 */
            padding-bottom: calc(100px + env(safe-area-inset-bottom)); 
        }
        .page { display:none; }
        .page.active { display:block; animation: crossFade 0.3s ease forwards; }
        @keyframes crossFade { from { opacity:0.5; } to { opacity:1; } }
        @keyframes popIn { from { opacity:0; transform:scale(0.85); } to { opacity:1; transform:scale(1); } }
        
        .large-title { font-size: 32px; font-weight: 800; color: var(--text-primary); padding: 16px 4px 12px; letter-spacing: -0.5px; }
        .section-title { font-size: 13px; font-weight: 600; color: var(--text-secondary); margin-bottom: 10px; margin-top: 24px; padding-left: 4px; text-transform: uppercase; letter-spacing: 0.5px; }
        
        /* 三、底部导航适配安全区 */
        .bottom-nav {
            position: absolute; bottom:0; left:0; right:0;
            background: rgba(255, 255, 255, 0.72); backdrop-filter: saturate(180%) blur(20px);
            -webkit-backdrop-filter: saturate(180%) blur(20px);
            display: flex; align-items: flex-start; justify-content: space-around;
            padding-top: 8px; z-index: 20; border-top: 0.5px solid var(--border);
            height: calc(83px + env(safe-area-inset-bottom));
            padding-bottom: env(safe-area-inset-bottom);
        }
        .nav-item { display: flex; flex-direction: column; align-items: center; gap: 4px; cursor: pointer; padding: 4px 12px; transition: 0.2s; min-width: 52px; position: relative; color: var(--text-secondary); }
        .nav-item svg { width: 26px; height: 26px; stroke-width: 1.5; transition: 0.2s; }
        .nav-item .nav-label { font-size: 10px; font-weight: 500; }
        .nav-item.active { color: var(--brand-green); }
        .nav-item.active svg { stroke-width: 2.5; transform: translateY(-1px); }
        .nav-item.active .nav-label { font-weight: 600; }
        
        .card { background: var(--card); border-radius: var(--radius-xl); padding: 16px; margin-bottom: 12px; box-shadow: var(--shadow); border: 0.5px solid rgba(0,0,0,0.04); }
        .btn { display: inline-flex; align-items: center; justify-content: center; gap: 6px; padding: 14px 24px; border-radius: 14px; font-size: 16px; font-weight: 600; border: none; cursor: pointer; transition: 0.2s; width: 100%; background: var(--brand-green); color: #fff; }
        .btn:active { opacity: 0.7; transform: scale(0.98); }
        .btn-outline { background: rgba(0,122,255,0.08); color: var(--brand-blue); }
        .btn-cancel { background: var(--bg); color: var(--brand-blue); }
        
        .city-bar { display: flex; align-items: center; gap: 4px; font-size: 15px; font-weight: 600; margin-bottom: 8px; cursor: pointer; width: fit-content; padding: 6px 10px; margin-left: -6px; border-radius: 10px; }
        .city-bar:active { background: rgba(0,0,0,0.05); }
        .parking-status-card { text-align: center; cursor: pointer; transition: 0.2s; padding: 24px 16px; }
        .parking-status-card:active { transform: scale(0.98); }
        .status-ring { width: 80px; height: 80px; border-radius: 24px; display: flex; align-items: center; justify-content: center; margin: 0 auto 16px; transition: 0.3s; background: #E8F8EE; }
        .status-ring.free svg { stroke: var(--brand-green); }
        .status-ring.occupied { background: #E8F0FE; }
        .status-ring.occupied svg { stroke: var(--brand-blue); }
        .status-ring.swapping { background: #FFF4E6; }
        .status-ring.swapping svg { stroke: #FF9500; }
        .status-ring svg { width: 36px; height: 36px; fill: none; stroke-width: 1.5; }
        
        .status-title { font-size: 20px; font-weight: 700; color: var(--text-primary); margin-bottom: 4px; letter-spacing: -0.3px; }
        .status-subtitle { font-size: 14px; color: var(--text-secondary); margin-bottom: 20px; }
        
        .quick-actions { display: flex; gap: 10px; flex-wrap: wrap; }
        .quick-action-chip { display: flex; align-items: center; gap: 8px; background: var(--card); padding: 10px 16px; border-radius: 20px; font-size: 14px; font-weight: 500; color: var(--text-primary); box-shadow: var(--shadow); cursor: pointer; transition: 0.2s; border: 0.5px solid var(--border); }
        .quick-action-chip:active { transform: scale(0.95); background: #f0f0f5; }
        .quick-action-chip svg { width: 18px; height: 18px; fill: var(--brand-blue); }

        .timeline-scroll { display: flex; gap: 12px; overflow-x: auto; padding-bottom: 8px; }
        .timeline-scroll::-webkit-scrollbar { display: none; }
        .timeline-card { min-width: 160px; background: var(--card); border-radius: 12px; padding: 14px; border: 0.5px solid var(--border); }
        .tl-time { font-size: 12px; font-weight: 700; margin-bottom: 6px; display: flex; align-items: center; gap: 4px; }
        .tl-text { font-size: 13px; color: var(--text-primary); line-height: 1.4; }

        .ios-list { background: var(--card); border-radius: var(--radius-xl); overflow: hidden; box-shadow: var(--shadow); margin-top: 8px; border: 0.5px solid rgba(0,0,0,0.04); }
        .ios-item { display: flex; align-items: center; gap: 12px; padding: 12px 16px; cursor: pointer; border-bottom: 0.5px solid var(--border); font-size: 16px; color: var(--text-primary); min-height: 58px; }
        .ios-item:last-child { border-bottom: none; }
        .ios-item:active { background: #f0f0f5; }
        .ios-item .icon-box { width: 32px; height: 32px; border-radius: 8px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
        .ios-item .icon-box svg { width: 18px; height: 18px; stroke: #fff; stroke-width: 2; fill: none; }
        .ios-item .menu-arrow { margin-left: auto; color: var(--text-muted); }
        .ios-item .menu-arrow svg { width: 12px; height: 12px; stroke: var(--text-muted); stroke-width: 2.5; fill: none; }

        .tab-switch { display: flex; background: #EDEDF0; border-radius: 10px; padding: 3px; margin: 16px 0; }
        .tab-btn { flex: 1; padding: 8px; border-radius: 8px; border: none; background: transparent; font-size: 13px; font-weight: 600; color: var(--text-secondary); transition: 0.2s; cursor: pointer; }
        .tab-btn.active { background: #fff; color: var(--text-primary); box-shadow: 0 1px 2px rgba(0,0,0,0.1); }

        /* 二、互换卡片：增加绝对定位以支持滑动消失 */
        .swap-card { padding: 18px; position: relative; transition: transform 0.4s ease, opacity 0.4s ease; touch-action: pan-y; }
        .match-badge { background: #E8F8EE; color: var(--brand-green); font-size: 12px; font-weight: 700; padding: 4px 10px; border-radius: 8px; float: right; }
        .user-row { display: flex; align-items: center; gap: 12px; margin-bottom: 14px; }
        .avatar { width: 44px; height: 44px; border-radius: 50%; background: linear-gradient(135deg, #5E5CE6, #007AFF); display: flex; align-items: center; justify-content: center; font-size: 18px; font-weight: 700; color: #fff; }
        .swap-route { display: flex; align-items: center; gap: 8px; font-size: 13px; color: var(--text-secondary); padding: 10px 12px; background: var(--bg); border-radius: 8px; margin: 8px 0; flex-wrap: wrap; }
        .tag-row { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 10px; }
        .tag { font-size: 11px; padding: 4px 10px; border-radius: 6px; background: #F0F0F5; color: var(--text-secondary); font-weight: 500; }
        .card-actions { display: flex; gap: 10px; margin-top: 16px; }
        .btn-pass, .btn-like { flex: 1; padding: 12px; border-radius: 12px; font-size: 14px; font-weight: 600; border: none; cursor: pointer; transition: 0.2s; display: flex; align-items: center; justify-content: center; gap: 6px;}
        .btn-pass { background: var(--bg); color: var(--text-secondary); }
        .btn-like { background: var(--brand-green); color: #fff; }
        .btn-pass:active, .btn-like:active { transform: scale(0.97); }

        .overlay { position: fixed; top:0; left:0; right:0; bottom:0; background: rgba(0,0,0,0.4); z-index:100; display:flex; align-items:center; justify-content:center; padding: 20px; }
        .overlay.hidden { display:none; }
        .modal { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(20px); border-radius: 20px; padding: 20px; width: 100%; max-width: 340px; animation: popIn 0.3s cubic-bezier(0.32, 0.72, 0, 1) forwards; box-shadow: var(--shadow-lg); max-height: 85vh; overflow-y: auto; }
        .modal-title { font-size: 18px; font-weight: 700; text-align: center; margin-bottom: 20px; color: var(--text-primary); }
        .form-group { margin-bottom: 16px; }
        .form-group label { display: block; font-size: 13px; font-weight: 600; color: var(--text-secondary); margin-bottom: 6px; padding-left: 4px; }
        .ios-input { width: 100%; padding: 14px 16px; background: #F2F2F7; border: 1px solid transparent; border-radius: 12px; font-size: 16px; color: var(--text-primary); outline: none; font-family: inherit; transition: 0.2s; }
        .ios-input:focus { border-color: var(--brand-blue); background: #fff; box-shadow: 0 0 0 4px rgba(0,122,255,0.1); }
        textarea.ios-input { resize: none; min-height: 80px; }
        .modal-btns { display: flex; flex-direction: column; gap: 10px; margin-top: 24px; }
        
        .msg-item { display: flex; gap: 12px; padding: 14px 0; border-bottom: 0.5px solid var(--border); cursor: pointer; }
        .msg-item:last-child { border: none; }
        .msg-item:active { opacity: 0.6; }
        .msg-icon { width: 40px; height: 40px; border-radius: 12px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
        .msg-icon svg { width: 20px; height: 20px; fill: #fff; }
        .msg-content { flex: 1; min-width: 0; }
        .msg-title { font-weight: 600; font-size: 15px; color: var(--text-primary); margin-bottom: 2px; }
        .msg-preview { font-size: 13px; color: var(--text-secondary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .msg-time { font-size: 12px; color: var(--text-secondary); flex-shrink: 0; }

        .credit-score-circle { width: 140px; height: 140px; border-radius: 50%; background: conic-gradient(var(--brand-green) 0% 85%, #E5E5EA 85% 100%); display: flex; align-items: center; justify-content: center; margin: 20px auto 16px; position: relative; }
        .credit-score-circle::before { content: ''; position: absolute; width: 110px; height: 110px; background: #fff; border-radius: 50%; }
        .score-inner { position: relative; z-index: 1; text-align: center; }
        .score-num { font-size: 40px; font-weight: 800; color: var(--text-primary); line-height: 1; }
        .score-label { font-size: 12px; color: var(--text-secondary); margin-top: 4px; }

        @media (max-width: 420px) {
            body { padding: 0; background: var(--bg); }
            .phone-frame { width: 100%; height: 100vh; max-height: 100vh; border-radius: 0; padding: 0; box-shadow: none; border: none; }
            .phone-screen { border-radius: 0; }
        }
    </style>
</head>

    // 二、左滑右滑手势逻辑
    let touchStartX = 0, touchMoveX = 0, isSwiping = false, currentSwipeCard = null;
    function bindSwipeGestures() {
        document.querySelectorAll('.swap-card').forEach(card => {
            card.addEventListener('touchstart', (e) => {
                if (e.target.closest('button')) return; // 点击按钮不触发拖拽
                currentSwipeCard = card;
                touchStartX = e.touches[0].clientX;
                isSwiping = true;
                card.style.transition = 'none';
            }, { passive: true });

            card.addEventListener('touchmove', (e) => {
                if (!isSwiping || currentSwipeCard !== card) return;
                touchMoveX = e.touches[0].clientX - touchStartX;
                const rotate = touchMoveX / 20;
                card.style.transform = `translateX(${touchMoveX}px) rotate(${rotate}deg)`;
            }, { passive: true });

            card.addEventListener('touchend', () => {
                if (!isSwiping || currentSwipeCard !== card) return;
                card.style.transition = 'transform 0.4s ease, opacity 0.4s ease';
                if (touchMoveX > 100) {
                    swipeCard('like', card.id); // 右滑喜欢
                } else if (touchMoveX < -100) {
                    swipeCard('pass', card.id); // 左滑忽略
                } else {
                    card.style.transform = 'translateX(0) rotate(0)';
                }
                isSwiping = false; currentSwipeCard = null; touchMoveX = 0;
            });
        });
    }

    function swipeCard(action, id) {
        const card = document.getElementById(id);
        if (!card) return;
        card.style.transition = '0.4s';
        card.style.transform = action==='like' ? 'translateX(120%) rotate(10deg)' : 'translateX(-120%) rotate(-10deg)';
        card.style.opacity = '0';
        setTimeout(() => card.remove(), 400);
        if (action==='like') {
            hapticFeedback(30); // 匹配成功强烈震动
            showToast('🎉 配对成功！');
        } else {
            hapticFeedback(10);
        }
    }

            case 'open-profile': openProfileEditor(); break;
            case 'close-profile': document.getElementById('profileOverlay').classList.add('hidden'); break;
            case 'open-invite': document.getElementById('inviteOverlay').classList.remove('hidden'); break;
            case 'copy-invite': navigator.clipboard?.writeText(document.getElementById('inviteCode').textContent).then(() => showToast('已复制邀请码')); break;
            case 'load-my-swaps': loadMySwaps(); break;
            case 'open-admin': document.getElementById('adminPasswordOverlay').classList.remove('hidden'); break;
            case 'close-admin-pwd': document.getElementById('adminPasswordOverlay').classList.add('hidden'); break;
            case 'verify-admin': verifyAdminPassword(); break;
            case 'close-admin-panel': document.getElementById('adminPanelOverlay').classList.add('hidden'); break;
            case 'close-history': document.getElementById('historyDetailOverlay').classList.add('hidden'); break;
            case 'show-history': showHistoryDetail(target.dataset.partner, target.dataset.date, target.dataset.time, target.dataset.spot, parseInt(target.dataset.rating)); break;
            case 'swipe-pass': swipeCard('pass', target.dataset.cardId); break;
            case 'swipe-like': swipeCard('like', target.dataset.cardId); break;
            case 'show-toast': showToast(target.dataset.msg); break;
            case 'contact-user': showToast('📞 联系车友'); break;
        }
    });

    // 底部导航委托
    document.querySelector('.bottom-nav').addEventListener('click', function(e) {
        const navItem = e.target.closest('.nav-item');
        if (navItem) switchPage(navItem.dataset.page);
    });

    // 互换页Tab委托
    document.querySelector('#page-swap .tab-switch').addEventListener('click', function(e) {
        const tabBtn = e.target.closest('.tab-btn');
        if (tabBtn) switchSwapTab(tabBtn.dataset.tab);
    });

    // 后台管理Tab委托
    document.getElementById('adminPanelOverlay').addEventListener('click', function(e) {
        const tabBtn = e.target.closest('[data-admin-tab]');
        if (tabBtn) switchAdminTab(tabBtn.dataset.adminTab);
    });

    // 星级评分委托
    document.addEventListener('click', e => {
        if (e.target.classList.contains('star')) {
            feedbackRating = parseInt(e.target.dataset.value);
            document.querySelectorAll('#starRating .star').forEach(s => s.classList.toggle('active', parseInt(s.dataset.value) <= feedbackRating));
        }
    });

    // 点击遮罩关闭弹窗
    document.querySelectorAll('.overlay').forEach(ov => {
        ov.addEventListener('click', function(e) { if (e.target === this) this.classList.add('hidden'); });
    });

    // 表单提交逻辑保留
    async function submitBooking(e) {
        e.preventDefault();
        const btn = e.target.querySelector('button[type=submit]');
        btn.disabled = true; btn.textContent = '提交中...';
        const formData = {
            name: document.getElementById('name').value.trim(),
            phone: document.getElementById('phone').value.trim(),
            car_number: document.getElementById('car_number').value.trim() || null,
            home_address: document.getElementById('home_address').value.trim(),
            work_address: document.getElementById('work_address').value.trim(),
            time_slot: document.getElementById('time_slot').value.trim()
        };
        const { error } = await client.from('swap_requests').insert([formData]);
        btn.disabled = false; btn.textContent = '提交预约';
        if (error) showToast('提交失败');
        else { showToast('✅ 预约成功！'); document.getElementById('bookingOverlay').classList.add('hidden'); }
        return false;
    }
    async function submitFeedback(e) {
        e.preventDefault();
        const content = document.getElementById('feedbackContent').value.trim();
        const { error } = await client.from('feedbacks').insert([{ content, rating: feedbackRating, user_id: currentUserPhone || 'anonymous' }]);
        if (error) showToast('提交失败');
        else { showToast('✅ 感谢反馈！'); document.getElementById('feedbackOverlay').classList.add('hidden'); }
        return false;
    }

    function openProfileEditor() {
        if (currentUserPhone) {
            client.from('user_profiles').select('*').eq('phone', currentUserPhone).single().then(({ data }) => {
                if (data) {
                    document.getElementById('profileNameInput').value = data.name || '';
                    document.getElementById('profilePhoneInput').value = data.phone;
                    document.getElementById('profileCarNumber').value = data.car_number || '';
                    document.getElementById('profileHomeAddress').value = data.home_address || '';
                    document.getElementById('profileWorkAddress').value = data.work_address || '';
                    document.getElementById('profileDeviceSN').value = data.device_sn || '';
                }
            });
        }
        document.getElementById('profileOverlay').classList.remove('hidden');
    }
    async function saveProfile(e) {
        e.preventDefault();
        const profileData = {
            phone: document.getElementById('profilePhoneInput').value.trim(),
            name: document.getElementById('profileNameInput').value.trim() || null,
            car_number: document.getElementById('profileCarNumber').value.trim() || null,
            home_address: document.getElementById('profileHomeAddress').value.trim() || null,
            work_address: document.getElementById('profileWorkAddress').value.trim() || null,
            device_sn: document.getElementById('profileDeviceSN').value.trim() || null
        };
        const { error } = await client.from('user_profiles').upsert(profileData, { onConflict: 'phone' });
        if (error) showToast('保存失败');
        else {
            currentUserPhone = profileData.phone;
            localStorage.setItem('currentUserPhone', currentUserPhone);
            loadCurrentUserProfile();
            showToast('✅ 保存成功！');
            document.getElementById('profileOverlay').classList.add('hidden');
        }
        return false;
    }
    async function loadCurrentUserProfile() {
        if (!currentUserPhone) return;
        const { data } = await client.from('user_profiles').select('*').eq('phone', currentUserPhone).single();
        if (data) {
            document.getElementById('profileName').textContent = data.name || '邻停易用户';
            document.getElementById('profilePhone').textContent = data.phone;
            document.getElementById('profileAvatar').textContent = (data.name || '邻').charAt(0);
        }
    }
    function verifyAdminPassword() {
        if (document.getElementById('adminPassword').value === ADMIN_PASSWORD) {
            document.getElementById('adminPasswordOverlay').classList.add('hidden');
            document.getElementById('adminPanelOverlay').classList.remove('hidden');
            switchAdminTab('swap');
        } else showToast('❌ 密码错误');
    }
    async function switchAdminTab(tab) {
        document.getElementById('tabSwapBtn').classList.toggle('active', tab==='swap');
        document.getElementById('tabFeedbackBtn').classList.toggle('active', tab==='feedback');
        const table = tab==='swap' ? 'swap_requests' : 'feedbacks';
        const { data } = await client.from(table).select('*').order('created_at', { ascending: false });
        const container = document.getElementById('adminTableContainer');
        if (!data || data.length===0) { container.innerHTML = '<div style="text-align:center;color:var(--text-muted);padding:20px;">暂无记录</div>'; return; }
        container.innerHTML = data.map(item => {
            if (tab==='swap') return `<div class="card" style="padding:14px;margin-bottom:8px;"><b>${item.name}</b> · ${item.phone}<br><span style="font-size:13px;color:var(--text-secondary);">${item.home_address} → ${item.work_address}</span><br><span style="font-size:12px;color:var(--text-muted);">${item.time_slot}</span><br><button style="color:var(--warning);margin-top:8px;font-size:13px;border:none;background:none;" onclick="deleteRecord('swap_requests','${item.id}')">删除</button></div>`;
            else return `<div class="card" style="padding:14px;margin-bottom:8px;"><b>${item.user_id || '匿名'}</b> · 评分：${item.rating}<br><span style="font-size:13px;color:var(--text-secondary);">${item.content}</span><br><button style="color:var(--warning);margin-top:8px;font-size:13px;border:none;background:none;" onclick="deleteRecord('feedbacks','${item.id}')">删除</button></div>`;
        }).join('');
    }
    async function deleteRecord(table, id) {
        await client.from(table).delete().eq('id', id);
        showToast('已删除');
        switchAdminTab(table==='swap_requests'?'swap':'feedback');
    }
    async function loadMySwaps() {
        const container = document.getElementById('mySwapsList');
        container.innerHTML = '<div class="card" style="text-align:center;color:var(--text-muted);">加载中...</div>';
        const { data } = await client.from('swap_requests').select('*').order('created_at', { ascending: false });
        if (!data || data.length===0) { container.innerHTML = '<div class="card" style="text-align:center;color:var(--text-muted);">暂无预约记录</div>'; return; }
        container.innerHTML = '<div class="section-title">我的预约</div>' + data.map(item => `
            <div class="card" style="padding:14px;">
                <b>${item.name}</b> · ${item.phone}<br>
                <span style="color:var(--text-secondary);font-size:13px;">${item.home_address} → ${item.work_address}</span><br>
                <span style="font-size:12px;color:var(--text-muted);">${item.time_slot}</span>
            </div>`).join('');
    }

    window.addEventListener('load', () => {
        document.getElementById('statusRing').innerHTML = icons.park;
        checkConnection();
        loadCurrentUserProfile();
        buildModals();
        renderRecommendCards();
        renderMessages();
        renderCreditPage();
    });
</script>
</body>
</html>
